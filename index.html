<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Birthday Surprise 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Pacifico&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  background:linear-gradient(135deg,#ffd6e7,#ffc2d1,#ffb3c6);
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* MAIN */

.container{
  width:90%;
  max-width:750px;
  padding:45px;
  border-radius:35px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  text-align:center;
  box-shadow:0 10px 40px rgba(255,105,180,0.25);
  z-index:2;
  animation:fadeIn 1.5s ease;
}

h1{
  font-family:'Pacifico',cursive;
  color:white;
  font-size:4rem;
  animation:float 2s infinite alternate;
  text-shadow:0 4px 15px rgba(255,255,255,0.5);
}

.typing{
  margin-top:20px;
  color:white;
  font-size:1.2rem;
  min-height:120px;
  white-space:pre-line;
}

button{
  margin-top:20px;
  padding:14px 30px;
  border:none;
  border-radius:50px;
  background:white;
  color:#ff4f8b;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.08);
  background:#ffe4ec;
}

/* HEARTS */

.heart{
  position:absolute;
  bottom:-100px;
  font-size:22px;
  animation:floatUp linear infinite;
  opacity:0.7;
}

@keyframes floatUp{
  to{
    transform:translateY(-120vh) rotate(360deg);
  }
}

/* ENVELOPE */

.envelope-screen{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#ffd6e7,#ffb6c1);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.envelope{
  width:220px;
  height:150px;
  background:#ff8fab;
  border-radius:10px;
  cursor:pointer;
  animation:bounce 2s infinite;
}

.envelope::before{
  content:'';
  position:absolute;
  width:220px;
  height:150px;
  clip-path:polygon(0 0,50% 50%,100% 0);
  background:#ffb3c6;
}

.envelope-text{
  color:white;
  margin-top:20px;
}

/* SURPRISE */

.surprise{
  position:fixed;
  inset:0;
  background:rgba(255,182,193,0.96);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  opacity:0;
  visibility:hidden;
  transition:0.5s;
  z-index:1000;
  text-align:center;
  padding:20px;
}

.surprise.active{
  opacity:1;
  visibility:visible;
}

.surprise h2{
  font-size:4rem;
  color:white;
  animation:zoom 1s infinite alternate;
}

.surprise p{
  color:white;
  font-size:1.3rem;
  margin-top:20px;
  max-width:700px;
}

@keyframes zoom{
  to{transform:scale(1.08);}
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

@keyframes float{
  from{transform:translateY(0);}
  to{transform:translateY(-8px);}
}

</style>
</head>

<body>

<!-- ENVELOPE -->
<div class="envelope-screen" id="envelopeScreen">
  <div class="envelope" onclick="openLetter()"></div>
  <div class="envelope-text">Tap envelope 💌</div>
</div>

<!-- HEARTS -->
<div class="heart" style="left:10%; animation-duration:8s;">💖</div>
<div class="heart" style="left:30%; animation-duration:10s;">💕</div>
<div class="heart" style="left:50%; animation-duration:7s;">💗</div>
<div class="heart" style="left:70%; animation-duration:9s;">💞</div>

<!-- MAIN -->
<div class="container">

<h1>🎂 Happy Birthday 🎀</h1>

<div class="typing" id="typing"></div>

<!-- YouTube Music -->
<iframe
  id="music"
  width="0"
  height="0"
  src="https://www.youtube.com/embed/ByOpP4f-228?autoplay=1&loop=1&playlist=ByOpP4f-228"
  frameborder="0"
  allow="autoplay">
</iframe>

<button onclick="showSurprise()">Open Surprise 🎁</button>
<button onclick="loveQuestion()">One More Thing 👀</button>

</div>

<!-- SURPRISE -->
<div class="surprise" id="surprise">

<h2>💖 Surprise 💖</h2>

<p>
Out of everyone in this world...<br><br>
I’m really thankful that you exist ✨<br><br>
You deserve all the happiness 🎂💕
</p>

</div>

<script>

// envelope
function openLetter(){
  document.getElementById("envelopeScreen").style.display="none";
}

// typing effect
const text = `
To someone special 💕
Happy Birthday!!

You make the world softer and brighter ✨
`;

let i=0;
function typing(){
  if(i<text.length){
    document.getElementById("typing").innerHTML += text[i];
    i++;
    setTimeout(typing,40);
  }
}
typing();

// surprise
function showSurprise(){
  document.getElementById("surprise").classList.add("active");
}

// TWIST BUTTON
function loveQuestion(){

  alert("Napakasama mong tao 😭");

  setTimeout(()=>{
    alert("Alam mo ba yon? 💔");
  },1200);

}

</script>

</body>
</html>
