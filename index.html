<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday 💖</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ffd6e7,#ffc2d1,#ffb3c6);
      position:relative;
    }

    .container{
      width:90%;
      max-width:700px;
      padding:40px;
      border-radius:30px;
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(12px);
      text-align:center;
      box-shadow:0 8px 32px rgba(255,105,180,0.2);
      z-index:2;
      animation:fadeIn 1.5s ease;
    }

    h1{
      font-size:4rem;
      color:white;
      text-shadow:0 4px 15px rgba(255,255,255,0.5);
      margin-bottom:15px;
      animation:floatText 2s ease-in-out infinite alternate;
    }

    .name{
      color:#fff0f5;
      font-weight:700;
    }

    p{
      color:white;
      font-size:1.2rem;
      line-height:1.8;
      margin-top:10px;
    }

    button{
      margin-top:30px;
      padding:14px 30px;
      border:none;
      border-radius:50px;
      background:white;
      color:#ff4f8b;
      font-size:1rem;
      font-weight:600;
      cursor:pointer;
      transition:0.3s ease;
      box-shadow:0 4px 15px rgba(255,255,255,0.3);
    }

    button:hover{
      transform:scale(1.08);
      background:#ffe4ec;
    }

    .heart{
      position:absolute;
      color:white;
      font-size:20px;
      animation:floatUp linear infinite;
      opacity:0.7;
    }

    @keyframes floatUp{
      from{
        transform:translateY(100vh) scale(1);
      }
      to{
        transform:translateY(-120vh) scale(1.5);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes floatText{
      from{
        transform:translateY(0px);
      }
      to{
        transform:translateY(-8px);
      }
    }

    .sparkle{
      position:absolute;
      width:6px;
      height:6px;
      border-radius:50%;
      background:white;
      animation:twinkle 2s infinite;
      opacity:0.8;
    }

    @keyframes twinkle{
      0%{
        transform:scale(0.5);
        opacity:0.3;
      }
      50%{
        transform:scale(1.5);
        opacity:1;
      }
      100%{
        transform:scale(0.5);
        opacity:0.3;
      }
    }
  </style>
</head>

<body>

  <!-- Floating Hearts -->
  <div class="heart" style="left:10%; animation-duration:10s;">💖</div>
  <div class="heart" style="left:25%; animation-duration:7s;">💕</div>
  <div class="heart" style="left:40%; animation-duration:11s;">💗</div>
  <div class="heart" style="left:60%; animation-duration:8s;">💞</div>
  <div class="heart" style="left:75%; animation-duration:12s;">💖</div>
  <div class="heart" style="left:90%; animation-duration:9s;">💕</div>

  <!-- Sparkles -->
  <div class="sparkle" style="top:20%; left:15%;"></div>
  <div class="sparkle" style="top:30%; left:80%;"></div>
  <div class="sparkle" style="top:70%; left:20%;"></div>
  <div class="sparkle" style="top:60%; left:75%;"></div>

  <div class="container">
    <h1>🎂 Happy Birthday 🎀</h1>

    <p>
      To my special <span class="name">Birthday Girl</span> 💕<br><br>

      May your day be filled with happiness, love, laughter,
      and all the beautiful things you deserve ✨
      Never stop smiling because your smile makes the world brighter 💖
    </p>

    <button onclick="showMessage()">
      Open Surprise 🎁
    </button>
  </div>

  <script>
    function showMessage(){
      alert("You are loved more than you know 💖✨");
    }
  </script>

</body>
</html>
